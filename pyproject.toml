[tool.pytest.ini_options]
# Auto-detect async test functions and run them under pytest-asyncio without
# requiring an explicit @pytest.mark.asyncio on every one. Several tests
# across this repo (written before this was configured) relied on the
# decorator; auto mode makes that a non-issue going forward, for both
# hand-written and self-upgrade-generated tests.
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
# Pyflakes only: undefined names, use-before-assignment, unused imports/vars,
# genuinely broken f-strings. Deliberately excludes style-only rule sets
# (line length, import sorting, docstrings, etc.) - the goal is catching
# real correctness bugs (see: the exception handlers and use-before-assign
# bugs this exact rule set caught in src/main.py during setup), not
# reformatting a large pre-existing codebase.
select = ["E9", "F"]
