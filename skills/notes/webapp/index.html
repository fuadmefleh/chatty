<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notes</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="app-header">
            <h1>📝 My Notes</h1>
            <button id="addNoteBtn" class="primary-btn">+ New Note</button>
        </header>

        <!-- Search Bar -->
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="🔍 Search notes..." />
        </div>

        <!-- Notes List -->
        <div id="notesList" class="notes-list">
            <div class="loading">Loading notes...</div>
        </div>

        <!-- Note Editor Modal -->
        <div id="noteEditorModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">New Note</h2>
                    <button id="closeModal" class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <textarea id="noteContent" placeholder="Write your note here..." rows="10"></textarea>
                </div>
                <div class="modal-footer">
                    <button id="deleteNoteBtn" class="danger-btn" style="display: none;">Delete</button>
                    <button id="saveNoteBtn" class="primary-btn">Save</button>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-icon">📝</div>
            <h3>No notes yet</h3>
            <p>Tap the "+ New Note" button to create your first note!</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
