# Unified Docker Compose deployment for Chatty.
#
# Quick start:
#   cp .env.example .env   # fill in your API keys/tokens
#   docker compose up -d --build
#   open http://localhost/
#
# Optional services (not started by default):
#   docker compose --profile searxng up -d    # self-hosted web search
#   docker compose --profile whisperx up -d   # local speaker-diarizing STT (scaffold, see docker/whisperx/)
#
# mini_app_server.py / start_notes_app.sh are intentionally NOT containerized
# here - superseded by chatty-web-server + the dashboard, not part of
# ecosystem.config.js, untouched since the initial commit.

services:
  chatty-bot:
    build:
      context: .
      dockerfile: Dockerfile.app
      args:
        INSTALL_FACE_RECOGNITION: "${INSTALL_FACE_RECOGNITION:-true}"
    container_name: chatty-bot
    command: ["python", "-m", "src.main"]
    env_file: .env
    environment:
      - PM2_APP_NAME=chatty-bot
      - RESTART_REQUESTS_DIR=/app/restart_requests
      - SELF_UPGRADE_WORKTREES_DIR=/worktrees
    volumes:
      # Whole repo, live - self_upgrade_manager.py needs a real .git checkout
      # (git worktree/commit/merge), not a baked-in snapshot.
      - .:/app
      - ../chatty_self_upgrade_worktrees:/worktrees
      # Optional deployer-provided `pi` CLI + its model config - see
      # Dockerfile.app's PATH setup. Safe to leave empty.
      - ./docker/pi-bin:/opt/pi-bin:ro
      - ./docker/pi-config:/root/.pi:ro
    working_dir: /app
    restart: unless-stopped

  chatty-web-server:
    build:
      context: .
      dockerfile: Dockerfile.app
      args:
        INSTALL_FACE_RECOGNITION: "${INSTALL_FACE_RECOGNITION:-true}"
    container_name: chatty-web-server
    command: ["python", "chatty_web_server.py"]
    env_file: .env
    environment:
      - PM2_APP_NAME=chatty-web-server
      - RESTART_REQUESTS_DIR=/app/restart_requests
      - SELF_UPGRADE_WORKTREES_DIR=/worktrees
      - CHATTY_WEB_PORT=${CHATTY_WEB_PORT:-8016}
    volumes:
      - .:/app
      - ../chatty_self_upgrade_worktrees:/worktrees
      - ./docker/pi-bin:/opt/pi-bin:ro
      - ./docker/pi-config:/root/.pi:ro
    working_dir: /app
    ports:
      # Optional direct access alongside the nginx front door.
      - "127.0.0.1:${CHATTY_WEB_PORT:-8016}:8016"
    restart: unless-stopped
    healthcheck:
      # Gates nginx's startup (below) so it never boots before this
      # hostname is actually resolvable/serving - nginx's static proxy_pass
      # only resolves DNS once at startup and does not retry, so without
      # this an unlucky startup order makes nginx refuse to start at all
      # (confirmed while testing this compose file).
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8016/api/chatty/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  order-explorer-backend:
    build:
      context: .
      dockerfile: order_explorer_site/backend/Dockerfile
    container_name: order-explorer-backend
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8015"]
    env_file: .env
    volumes:
      # Same repo root as chatty-bot, so ../../data resolves to the same
      # shared SQLite files - no API layer between these two services.
      - .:/app
    working_dir: /app/order_explorer_site/backend
    restart: unless-stopped
    healthcheck:
      # This image has no curl (see order_explorer_site/backend/Dockerfile -
      # deliberately no apt packages at all), so use a plain TCP connect via
      # stdlib socket instead of an HTTP-aware check.
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 8015), 2).close()"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  order-explorer-frontend:
    build:
      context: .
      dockerfile: order_explorer_site/frontend/Dockerfile
    container_name: order-explorer-frontend
    environment:
      - FRONTEND_LIVE_SOURCE=true
    volumes:
      - ./order_explorer_site/frontend:/app
      # Named volume, not a bind mount - avoids host/container mismatches in
      # Vite/Rolldown's platform-specific native binaries.
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped
    healthcheck:
      # The entrypoint rebuilds from live source before nginx starts (see
      # docker/frontend/docker-entrypoint.sh), so start_period is generous.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    container_name: chatty-nginx
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      chatty-web-server:
        condition: service_healthy
      order-explorer-backend:
        condition: service_healthy
      order-explorer-frontend:
        condition: service_healthy
    restart: unless-stopped

  # Sidecar restarter - the ONLY container with the Docker socket mounted.
  # Polls restart_requests/ for signal files written by
  # src/managers/self_upgrade_manager.py's _restart_services() and issues
  # `docker restart` on the named containers, so self-upgrade/feature-request
  # merges can restart affected services without pm2 and without giving
  # Docker socket access to the container that runs AI-modified code.
  restarter:
    build:
      context: ./docker/restarter
    container_name: chatty-restarter
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./restart_requests:/restart_requests
    restart: unless-stopped

  # Optional: self-hosted web search (docker compose --profile searxng up -d).
  # If you already have a SearXNG instance running elsewhere, skip this and
  # just point SEARXNG_BASE_URL at it in .env instead.
  searxng:
    image: searxng/searxng:latest
    container_name: chatty-searxng
    profiles: ["searxng"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8080"
    volumes:
      - ./docker/searxng:/etc/searxng:rw

  # Optional: local speaker-diarizing STT server (docker compose --profile
  # whisperx up -d). SCAFFOLD - see docker/whisperx/Dockerfile's header
  # comment; speaker-embedding extraction is not fully implemented yet.
  whisperx:
    build:
      context: ./docker/whisperx
    container_name: chatty-whisperx
    profiles: ["whisperx"]
    restart: unless-stopped
    environment:
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN:-}
      - STT_LOCAL_MODEL_SIZE=${STT_LOCAL_MODEL_SIZE:-base}
      - STT_LOCAL_DEVICE=${STT_LOCAL_DEVICE:-cpu}
    ports:
      - "127.0.0.1:8003:8003"
    volumes:
      - whisperx_models:/root/.cache

volumes:
  frontend_node_modules:
  whisperx_models:
