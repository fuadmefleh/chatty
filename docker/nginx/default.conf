# Reverse-proxy fronting the whole compose stack, modeled directly on the
# author's own host-level nginx config (routing structure only - TLS/Certbot
# and the personal domain are that host's own concern, left out here so any
# deployer can put their own TLS termination in front of this container).
#
# proxy_pass targets are deliberately static hostnames, NOT variables. Using
# a variable here (e.g. to force per-request DNS re-resolution) disables
# nginx's automatic "replace the matched location prefix, keep the rest of
# the URI" behavior entirely - it was tried and confirmed to silently drop
# the request path, sending only the literal configured path to the
# upstream regardless of what the client actually requested. Since the
# `restarter` sidecar (docker/restarter/) calls `docker restart` (which
# keeps the same container and IP on Docker's default bridge network, unlike
# a remove+recreate), nginx's normal one-time-at-startup DNS resolution
# doesn't go stale from that restart flow - no variable trick needed. The
# startup-ordering race (nginx booting before a backend's hostname is
# resolvable) is instead handled by healthcheck-gated `depends_on` in
# docker-compose.yml.
server {
    listen 80;
    server_name _;

    # Order-explorer FastAPI backend (order-explorer-backend:8015) - prefix
    # stripped before proxying.
    location /api/explorer/ {
        proxy_pass http://order-explorer-backend:8015/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Atlas web API (chatty-web-server:8016) - includes the chat WebSocket,
    # prefix kept as-is.
    location /api/chatty/ {
        proxy_pass http://chatty-web-server:8016/api/chatty/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # React dashboard (order-explorer-frontend:80, served by that image's
    # own nginx).
    location / {
        proxy_pass http://order-explorer-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
